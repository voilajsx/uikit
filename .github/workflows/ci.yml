name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run typecheck

      - name: Generate themes
        run: npm run generate-themes

      - name: Build library
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Test package exports
        run: |
          # Test that all exports work
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            Object.keys(pkg.exports).forEach(exp => {
              if (exp !== '.' && exp !== './styles') {
                try {
                  require('./dist/' + pkg.exports[exp].import.replace('./dist/', ''));
                  console.log('✓ Export works:', exp);
                } catch (e) {
                  console.error('✗ Export failed:', exp, e.message);
                  process.exit(1);
                }
              }
            });
          "

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.node-version }}
          path: dist/
          retention-days: 1

  visual-tests:
    name: Visual Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build demo
        run: npm run build

      - name: Start demo server
        run: npm run preview &

      - name: Wait for server
        run: npx wait-on http://localhost:4173

      - name: Run Playwright tests (if you add them)
        run: |
          # npx playwright test
          echo "Visual tests would run here"
